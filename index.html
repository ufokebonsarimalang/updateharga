<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Harga</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f4f6f8;
}

/* LOGIN */
#loginBox {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:white;
  padding:30px;
  border-radius:12px;
  width:300px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  text-align:center;
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:1px solid #ddd;
  border-radius:8px;
}

button {
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.btn-login {
  background:#007bff;
  color:white;
}

.btn-ubah {
  background:#ff9800;
  color:white;
}

/* PRODUK */
#produk {
  padding:10px;
}

.item {
  background:white;
  margin:10px;
  padding:10px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* POPUP */
#formEdit {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.popup {
  background:white;
  padding:20px;
  border-radius:12px;
  width:300px;
}

body{background:#eef3f8!important;font-family:Arial,sans-serif}
#produk{max-width:900px;margin:auto;padding:20px}
.item{display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:16px;padding:20px;margin:15px 0;box-shadow:0 8px 24px rgba(0,0,0,.08)}
.tipe{font-size:20px;font-weight:700}
.label{color:#777;margin-top:10px}
.harga{font-size:28px;color:#0a7a36;font-weight:700}
.btn-ubah{width:auto;padding:12px 18px;border-radius:10px}
  .header{
    background:#2563eb;
    color:white;
    padding:20px;
    border-radius:18px;
    margin-bottom:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 8px 20px rgba(0,0,0,.12);
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">

    <div class="card">

        <div style="font-size:60px;margin-bottom:15px;">🏪</div>

        <h2>UPDATE HARGA</h2>

        <p style="color:#777;margin-bottom:25px;">
            Silakan login menggunakan PIN Sales
        </p>

        <input
            id="pin"
            type="password"
            placeholder="Masukkan PIN">

        <button
            class="btn-login"
            onclick="login()">
            LOGIN
        </button>

    </div>

</div>
<!-- PRODUK -->
<div id="produk">

    <div class="header">

        <div>

            <h2 style="margin:0;">
                📋 Update Harga Produk
            </h2>

            <small style="opacity:.8;">
                Pilih produk yang akan diubah
            </small>

        </div>

    </div>

    <div id="listProduk"></div>

</div>

<!-- POPUP EDIT -->
<div id="formEdit">
  <div class="popup">
    <h3>Edit Harga</h3>

    <label>Harga Lama</label>
    <input id="hargaLama" disabled>

    <label>Harga Baru</label>
    <input id="hargaBaru">

    <label>Catatan</label>
    <input id="catatan">

    <button class="btn-login" onclick="simpan()">SIMPAN</button>
    <button onclick="closeEdit()">BATAL</button>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxKe1KXs3Qigmf7UePOrVfzHt6F3JeXkUMl_sN1-FV4qC5QWGa0EUxgBYJfBbN_8el8LA/exec";

let selectedTipe = "";

/* ================= LOGIN ================= */
function login() {
  const pinValue = document.getElementById("pin").value;

  fetch(API + "?action=login&pin=" + pinValue)
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      localStorage.setItem("brand", data.brand);

      document.getElementById("loginBox").style.display = "none";
      document.getElementById("produk").style.display = "block";

      loadProduk();
    } else {
      alert("PIN salah");
    }
  });
}


/* ================= LOAD PRODUK ================= */
function loadProduk() {
  const brand = localStorage.getItem("brand");

  fetch(API + "?action=list&brand=" + brand)
  .then(r => r.json())
  .then(data => {

    let html = "";

    data.forEach(p => {
      html += `
        <div class="item">
          <div>
            <div class="tipe">${p.tipe}</div>
            <div class="label">Harga Saat Ini</div>
            <div class="harga">Rp ${p.harga}</div>
          </div>
          <button class="btn-ubah" onclick="edit('${p.tipe}','${p.harga}')">✏ Ubah Harga</button>
        </div>
      `;
    });

    dodocument.getElementById("listProduk").innerHTML = html;cument.getElementById("produk").innerHTML = html;
  });
}


/* ================= EDIT ================= */
function edit(tipe, harga) {
  selectedTipe = tipe;

  document.getElementById("formEdit").style.display = "flex";
  document.getElementById("hargaLama").value = harga;
  document.getElementById("hargaBaru").value = harga;
}


/* ================= CLOSE POPUP ================= */
function closeEdit() {
  document.getElementById("formEdit").style.display = "none";
}


/* ================= SIMPAN ================= */
function simpan() {
  const brand = localStorage.getItem("brand");

  fetch(API +
    "?action=update" +
    "&brand=" + brand +
    "&tipe=" + selectedTipe +
    "&harga=" + document.getElementById("hargaBaru").value +
    "&catatan=" + document.getElementById("catatan").value
  )
  .then(r => r.json())
  .then(res => {
    if (res.success) {
      alert("✅ Berhasil update");
      closeEdit();
      loadProduk();
    } else {
      alert("❌ Gagal update");
    }
  });
}
</script>

</body>
</html>
